server:
  port: 8080

spring:
  application:
    name: freshai-grocery

  # ── Database ─────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/grocery_clean?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      connection-test-query: SELECT 1

  # ── SQL Init: schema.sql + data.sql run AFTER Hibernate creates tables ───
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations:   classpath:data.sql

  # ── JPA ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none     # Schema is managed by schema.sql; Hibernate only validates
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # ── MVC (404 handling) ───────────────────────────────────────
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # ── Email / SMTP ──────────────────────────────────────────────
  # Set MAIL_USERNAME and MAIL_PASSWORD environment variables (Gmail App Password)
  # Example (PowerShell):
  #   $env:MAIL_USERNAME = "you@gmail.com"
  #   $env:MAIL_PASSWORD = "abcd efgh ijkl mnop"   ← 16-char Gmail App Password
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}      # ← REQUIRED: set MAIL_USERNAME env var
    password: ${MAIL_PASSWORD:}      # ← REQUIRED: set MAIL_PASSWORD env var
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        debug: true                  # prints SMTP conversation to console for debugging
    test-connection: false           # prevents startup failure when SMTP is not configured

# ── App Config ────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}           # 15 minutes (override via env)
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

  frontend:
    url: http://localhost:3000

  mail:
    enabled: ${MAIL_ENABLED:true}    # set MAIL_ENABLED=false to suppress emails in dev
    from-name: "FreshAI"
    from-address: ${MAIL_USERNAME:noreply@freshai.com}

  otp:
    expiry-minutes: 10
    max-attempts: 5

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.freshai.grocery: DEBUG          # app-level debug
    org.springframework.mail: DEBUG     # Spring Mail framework logs
    com.sun.mail: DEBUG                 # JavaMail SMTP protocol debug
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN
