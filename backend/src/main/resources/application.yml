server:
  port: 8080

spring:
  application:
    name: freshai-grocery
  datasource:
    url: jdbc:mysql://localhost:3306/freshai_grocery?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: FreshAI2024SecretKeyForJWTTokenGenerationMustBe256BitsLongAtLeast!!
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.freshai.grocery: DEBUG
    org.springframework.security: DEBUG
